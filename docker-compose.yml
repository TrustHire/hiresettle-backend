services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hiresettle
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hiresettle_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiresettle"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://hiresettle:password@postgres:5432/hiresettle_db
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
