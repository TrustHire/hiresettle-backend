name: Weekly Dependency Vulnerability Scan

on:
  schedule:
    - cron: '0 6 * * 1' # every Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  list-branches:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.branches.outputs.result }}
    steps:
      - name: List active branches
        id: branches
        uses: actions/github-script@v7
        with:
          script: |
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            return branches.map((b) => b.name);
          result-encoding: string

  audit:
    needs: list-branches
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.list-branches.outputs.branches) }}
    outputs:
      vulnerable: ${{ steps.audit.outputs.vulnerable }}
    steps:
      - name: Checkout ${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run audit
        id: audit
        run: |
          if npm audit --audit-level=high --json > audit-${{ matrix.branch }}.json; then
            echo "vulnerable=false" >> "$GITHUB_OUTPUT"
          else
            echo "vulnerable=true" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Upload audit report
        if: steps.audit.outputs.vulnerable == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ matrix.branch }}
          path: audit-${{ matrix.branch }}.json

  report:
    needs: audit
    if: always() && contains(needs.audit.outputs.*.vulnerable, 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Download audit reports
        uses: actions/download-artifact@v4
        with:
          pattern: audit-report-*
          path: reports
          merge-multiple: true

      - name: Open issue for new vulnerabilities
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.existsSync('reports') ? fs.readdirSync('reports') : [];
            const branches = files.map((f) => f.replace(/^audit-/, '').replace(/\.json$/, ''));
            const body = [
              'The weekly dependency vulnerability scan found high/critical severity issues on the following branch(es):',
              '',
              ...branches.map((b) => `- \`${b}\``),
              '',
              'Run `npm audit --audit-level=high` locally on the affected branch for details, or download the `audit-report-*` artifacts from this workflow run.',
              '',
              'See docs/security.md for the patch and triage process.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Dependency vulnerability scan: ${branches.length} branch(es) affected (${new Date().toISOString().slice(0, 10)})`,
              body,
              labels: ['security', 'dependencies'],
            });
